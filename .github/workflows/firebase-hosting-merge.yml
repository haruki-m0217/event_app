name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAKUSAI_6C962 }}
          channelId: live
          projectId: gakusai-6c962
      # Deploy Storage rules
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAKUSAI_6C962 }}' > /tmp/sa.json
      - run: npm install -g firebase-tools
      - run: firebase deploy --only storage --project gakusai-6c962
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
